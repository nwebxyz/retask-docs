name: check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test
      - run: yarn build

  cli-reference-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Install retask CLI
        run: |
          curl -fsSL https://retask.work/install.sh | sh
          # Non-root runner → install.sh installs to ~/.local/bin.
          # Do not add /usr/local/bin: its node (22.x) would shadow Node 24 for gen:cli.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Regenerate the CLI reference
        run: yarn gen:cli
      - name: Fail if the committed reference is stale
        run: git diff --exit-code -- src/content/docs/cli/reference
